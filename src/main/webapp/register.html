<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <header>
        <img src="blood 2.jpg" alt="BLOOD 4 YOU Logo" class="logo">
        <h1>Register for BLOOD 4 YOU</h1>
    </header>

    <main>
        <form action="register" method="POST">
            <input type="text" name="name" placeholder="Name" required> <br> <br>
            <input type="text" name="mobile" placeholder="Mobile Number" required> <br> <br>
            <input type="email" name="email" placeholder="Email" required> <br> <br>
            <input type="password" name="password" placeholder="Password" required> <br> <br>
            <input type="text" name="location" placeholder="Location" required> <br> <br>
            <input type="text" name="bloodgroup" placeholder="Blood Group" required> <br> <br>
            <button type="submit" class="button">Register</button> <br> <br>
        </form>

        <div>
            <a href="login.html" class="button">Go to Login</a>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 BLOOD 4 YOU. All rights reserved By Chandu.</p>
            <div class="social-links">
                <a href="mailto:your-email@gmail.com" class="social-icon">Gmail</a>
                <a href="https://chat.whatsapp.com/EKckhyum8UF3NaEF3d6XWM" class="social-icon">WhatsApp</a>
            </div>
        </div>
    </footer>
</body>
</html>
